services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: quiz_bot
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quiz_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/sql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz -d quiz_bot"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "127.0.0.1:5432:5432"

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://quiz:${POSTGRES_PASSWORD:-quiz_password}@postgres:5432/quiz_bot
    volumes:
      - ./app:/app/app
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777

volumes:
  postgres_data:
